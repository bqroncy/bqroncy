<svg width="800" height="100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    /* Font Yükleme - Yüklenmezse Courier New devreye girer */
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');

    /* Titreme Animasyonu (Saf CSS) */
    @keyframes flicker {
      0%, 100% { opacity: 1; }
      3% { opacity: 0.4; }
      6% { opacity: 1; }
      7% { opacity: 0.4; }
      8% { opacity: 1; }
      9% { opacity: 1; }
      10% { opacity: 0.1; }
      11% { opacity: 1; }
      50% { opacity: 1; }
      52% { opacity: 0.1; }
      54% { opacity: 1; }
    }

    .hacker-text {
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      font-size: 55px;
      fill: #ce1212; /* Ürkütücü Kırmızı */
      text-anchor: middle;
      dominant-baseline: middle;
      animation: flicker 4s infinite;
      filter: url(#glow); /* Parlama Efekti */
    }
  </style>

  <text x="50%" y="50%" class="hacker-text">bqroncy@kali</text>
</svg>
