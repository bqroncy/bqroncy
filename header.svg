<svg fill="none" viewBox="0 0 800 80" width="800" height="80" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&amp;display=swap');

        @keyframes flicker {
          0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
            opacity: 1;
            text-shadow: 0 0 10px #ce1212;
          }
          20%, 24%, 55% {
            opacity: 0.1;
            text-shadow: none;
          }
        }
        
        .container {
          display: flex;
          justify-content: center;
          align-items: center;
          height: 100%;
        }

        .text {
          font-family: 'Orbitron', sans-serif;
          font-size: 35px;
          font-weight: 700;
          text-transform: uppercase;
          letter-spacing: 1px;
          color: #ce1212;
          animation: flicker 4s infinite;
        }
      </style>
      <div class="container">
        <div class="text">Baran 'bqroncy' Ömeroğulları</div>
      </div>
    </div>
  </foreignObject>
</svg>
